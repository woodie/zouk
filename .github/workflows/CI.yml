name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  # Keyed on the ref (stable per branch/PR), not run_id (unique per run) --
  # so a new push to the same branch cancels any older run still
  # queued/running instead of letting a slow runner for an already-superseded
  # commit clobber the badge with a stale result.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # zouk is a SwiftUI macOS app with no Linux/iOS target -- see
    # docs/COWORK.md's sandbox note. macos-latest ships Xcode + Swift
    # preinstalled, and the unit tests are plain XCTest (no UI tests), so
    # no simulator boot is needed.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Install xctidy
        # make test now pipes through xctidy -fs (see Makefile) for readable nested
        # describe/context/it output -- xctidy has no Homebrew tap yet, so it's built from
        # source per its own README, pinned to its latest tagged release rather than main so an
        # unreleased xctidy change can't break this CI unexpectedly.
        run: |
          git clone --branch v0.3.0 --depth 1 https://github.com/woodie/xctidy.git "$RUNNER_TEMP/xctidy"
          make -C "$RUNNER_TEMP/xctidy" install

      - name: Test
        run: make test

      - name: Bundle
        # Exercises the .app-assembly path (make run uses this too) that
        # `make build`/`make test` never touch. This is what would have
        # caught the missing zouk_ZoukKit.bundle regression (see docs/
        # COWORK.md's "Packaging gotcha" note) before it shipped in v1.1.
        run: make bundle
