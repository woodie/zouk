name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # Same rationale as CI.yml -- zouk is macOS-only, macos-latest ships
    # Xcode/Swift (and gh, used below) preinstalled.
    runs-on: macos-latest

    outputs:
      zip_version: ${{ steps.checksum.outputs.zip_version }}
      zip_sha256: ${{ steps.checksum.outputs.zip_sha256 }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Install xctidy
        # Same rationale as CI.yml -- make test pipes through xctidy -fs now, and xctidy has no
        # Homebrew tap yet, so it's built from source, pinned to its latest tagged release.
        run: |
          git clone --branch v0.3.0 --depth 1 https://github.com/woodie/xctidy.git "$RUNNER_TEMP/xctidy"
          make -C "$RUNNER_TEMP/xctidy" install

      - name: Test
        run: make test

      - name: Import signing certificates
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_P12_BASE64: ${{ secrets.INSTALLER_CERTIFICATE_P12_BASE64 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.INSTALLER_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          keychain_path="$RUNNER_TEMP/signing.keychain-db"
          cert_path="$RUNNER_TEMP/certificate.p12"
          installer_cert_path="$RUNNER_TEMP/installer-certificate.p12"

          # openssl's base64 decode (not the bare `base64` CLI) -- its
          # decode flag differs across macOS/BSD vs GNU and isn't worth
          # the ambiguity on a step that's hard to debug from CI logs.
          echo "$CERTIFICATE_P12_BASE64" | openssl base64 -d -A -out "$cert_path"
          echo "$INSTALLER_CERTIFICATE_P12_BASE64" | openssl base64 -d -A -out "$installer_cert_path"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"

          # pkgbuild (unlike codesign) refuses to select a signing
          # identity unless its full certificate chain verifies locally
          # right at --sign time -- it won't just take the leaf cert+key
          # on faith the way codesign does. A freshly created CI keychain
          # has the leaf for both identities but not Apple's intermediate,
          # which is why `make sign` (codesign, Application cert) can pass
          # while `make pkg` (pkgbuild, Installer cert) fails with "Could
          # not find appropriate signing identity". Fetching both the
          # current G2 intermediate and the legacy one (whichever the
          # leaf actually chains to) and importing them as plain certs --
          # no -A/-P, they carry no private key -- fixes chain validation
          # for both identities.
          curl -fsSL -o "$RUNNER_TEMP/DeveloperIDG2CA.cer" https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -fsSL -o "$RUNNER_TEMP/DeveloperIDCA.cer" https://www.apple.com/certificateauthority/DeveloperIDCA.cer
          security import "$RUNNER_TEMP/DeveloperIDG2CA.cer" -k "$keychain_path"
          security import "$RUNNER_TEMP/DeveloperIDCA.cer" -k "$keychain_path"

          # Both certs (Application + Installer) go into the same
          # keychain -- codesign and productbuild each just need their
          # respective identity to be findable via -k, no separate
          # keychains required.
          security import "$cert_path" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security import "$installer_cert_path" -P "$INSTALLER_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychain -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/"//g')

      - name: Sign
        run: make sign

      - name: Notarize and staple
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          # notarytool only accepts a zip/dmg/pkg upload, not a raw .app --
          # this zip is throwaway, just to get bytes to Apple. The zip
          # `make package` produces next is the real distributable,
          # built from the now-stapled .build/zouk.app below.
          submission_zip="$RUNNER_TEMP/zouk-notarize-submission.zip"
          ditto -c -k --keepParent ".build/zouk.app" "$submission_zip"
          xcrun notarytool submit "$submission_zip" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple ".build/zouk.app"

      - name: Package
        run: make package

      - name: Build installer package
        run: make pkg

      - name: Notarize and staple installer package
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          # Unlike the .app above, notarytool accepts a .pkg directly --
          # no throwaway submission zip needed. Stapling attaches the
          # ticket to the .pkg itself, independent of whatever the .app
          # inside it has (or doesn't have) stapled.
          pkg_path=$(ls .build/release/*.pkg)
          xcrun notarytool submit "$pkg_path" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$pkg_path"

      - name: Compute checksum
        id: checksum
        run: |
          zip_path=$(ls .build/release/*.zip)
          pkg_path=$(ls .build/release/*.pkg)
          zip_sha256=$(shasum -a 256 "$zip_path" | awk '{print $1}')
          pkg_sha256=$(shasum -a 256 "$pkg_path" | awk '{print $1}')
          # Short version (e.g. "1.8") as it appears in the zip name --
          # this is the after_comma half of the cask's compound `version`;
          # the before_comma half is just the pushed tag with its leading
          # "v" stripped.
          zip_version=$(basename "$zip_path" .zip | sed 's/^zouk-//')
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "pkg_path=$pkg_path" >> "$GITHUB_OUTPUT"
          echo "zip_sha256=$zip_sha256" >> "$GITHUB_OUTPUT"
          echo "zip_version=$zip_version" >> "$GITHUB_OUTPUT"
          echo "### sha256 for the Homebrew cask" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "$zip_sha256  $(basename "$zip_path")" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "### sha256 for the .pkg installer" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "$pkg_sha256  $(basename "$pkg_path")" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Pulls from docs/releases/<tag>.md instead of --generate-notes'
          # auto-generated commit list -- write and commit that file (same
          # convention as humane/humane-ruby/humane-swift's own
          # docs/releases/) before pushing the tag that triggers this
          # workflow. Fails loudly if it's missing rather than silently
          # falling back to generated notes, on purpose: that's the signal
          # the tag got pushed a step too early.
          gh release create "${{ github.ref_name }}" \
            "${{ steps.checksum.outputs.zip_path }}" \
            "${{ steps.checksum.outputs.pkg_path }}" \
            --title "${{ github.ref_name }}" \
            --notes-file "docs/releases/${{ github.ref_name }}.md"

  trigger-homebrew-bump:
    # The actual cask bump (sed the version/sha256, commit, tag) now lives
    # in woodie/homebrew-zouk's own .github/workflows/bump-cask.yml,
    # triggered by the repository_dispatch event fired below -- see that
    # repo. This job's only job is to fire that event with this release's
    # version/sha256; homebrew-zouk's own workflow does the write using its
    # own default GITHUB_TOKEN (scoped to itself), so HOMEBREW_TAP_TOKEN
    # only ever needs to be able to trigger a dispatch on that repo, not
    # write to it directly.
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch bump-cask event to homebrew-zouk
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          gh api repos/woodie/homebrew-zouk/dispatches --input - <<EOF
          {
            "event_type": "bump-cask",
            "client_payload": {
              "tag": "${{ github.ref_name }}",
              "short_version": "${{ needs.release.outputs.zip_version }}",
              "sha256": "${{ needs.release.outputs.zip_sha256 }}"
            }
          }
          EOF
