name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    # Same rationale as CI.yml -- zouk is macOS-only, macos-latest ships
    # Xcode/Swift (and gh, used below) preinstalled.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          make build
          make test

      - name: Package
        run: make package

      - name: Compute checksum
        id: checksum
        run: |
          zip_path=$(ls .build/release/*.zip)
          sha256=$(shasum -a 256 "$zip_path" | awk '{print $1}')
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "### sha256 for the Homebrew cask" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "$sha256  $(basename "$zip_path")" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" "${{ steps.checksum.outputs.zip_path }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes
